{% if timer_corrida %}
    <button class="arrow-countdown">&gt;&gt;</button>
{% endif %}
<section class="countdown">
    <h4>Fique de olho na próxima corrida!🏎️</h4>
    <p>NO DIA {{ timer_corrida.date | date:"d/m/Y" }}</p>
    <div class="container-countdown">
    <span class="timer" data-target="{{ timer_corrida.date | date:'c' }}"></span>
    </div>
</section>
